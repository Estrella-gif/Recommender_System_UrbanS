<div class="min-h-screen bg-slate-50 p-8 font-sans">
  <div class="max-w-5xl mx-auto">

    <header class="mb-8">
      <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight">Panel de Control IA</h1>
      <p class="text-slate-500 mt-1">Monitoreo en tiempo real de los modelos de recomendación</p>
    </header>

    <!-- Pestañas de Selección de Modelo -->
    <div class="flex space-x-3 mb-6 bg-white p-2 rounded-xl shadow-sm border border-slate-200 w-fit">
      <button
        (click)="startTracking('ML')"
        [ngClass]="activeModel === 'ML' ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-600 hover:bg-slate-100'"
        class="px-5 py-2 rounded-lg font-medium transition-all duration-200 text-sm">
        Machine Learning
      </button>

      <button
        (click)="startTracking('DL')"
        [ngClass]="activeModel === 'DL' ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-600 hover:bg-slate-100'"
        class="px-5 py-2 rounded-lg font-medium transition-all duration-200 text-sm">
        Deep Learning
      </button>

      <button
        (click)="startTracking('HYBRID')"
        [ngClass]="activeModel === 'HYBRID' ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-600 hover:bg-slate-100'"
        class="px-5 py-2 rounded-lg font-medium transition-all duration-200 text-sm">
        Modelo Híbrido
      </button>
    </div>

    <!-- Tarjeta del Gráfico -->
    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
      <h3 class="text-lg font-semibold text-slate-700 mb-4">Métricas de Precision & Recall</h3>
      <div class="h-96">
        <canvas baseChart
                [data]="lineChartData"
                [options]="lineChartOptions"
                [type]="lineChartType">
        </canvas>
      </div>
    </div>

  </div>
</div>
